<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#FFC107" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#424242" />
      <stop offset="100%" stop-color="#212121" />
    </linearGradient>
  </defs>
  <!-- Geometric Construction/Architecture Icon -->
  <g transform="translate(10, 10)">
    <!-- Main structural arches / Building beam -->
    <path d="M 40 100 L 70 20 L 100 100" stroke="#FFC107" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 15 100 L 55 20 L 75 60" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Horizontal support beams (crane/scaffold style) -->
    <line x1="45" y1="80" x2="95" y2="80" stroke="#FFC107" stroke-width="4" stroke-linecap="round" />
    <line x1="55" y1="60" x2="85" y2="60" stroke="#FFC107" stroke-width="4" stroke-linecap="round" />
    <line x1="63" y1="40" x2="77" y2="40" stroke="#FFC107" stroke-width="4" stroke-linecap="round" />
    <!-- Tiny decorative design compass / grid point -->
    <circle cx="70" cy="20" r="5" fill="#FFFFFF" />
    <circle cx="40" cy="100" r="4" fill="#FFC107" />
    <circle cx="100" cy="100" r="4" fill="#FFC107" />
  </g>
  <!-- Typography Section -->
  <text x="130" y="65" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="2">APEX</text>
  <text x="250" y="65" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="38" font-weight="900" fill="#FFC107" letter-spacing="2">BUILD</text>
  <text x="132" y="92" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9E9E9E" letter-spacing="6">ENGINEERING &amp; CONSTRUCTION</text>
</svg>
